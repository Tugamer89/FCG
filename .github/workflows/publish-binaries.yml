name: Publish Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., v1.0.0) to associate with the uploaded binaries'
        required: true

permissions:
  contents: write

jobs:
  publish-binaries:
    name: Package for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: fcg-linux.zip
          - os: windows-latest
            artifact_name: fcg-windows.zip
          - os: macos-latest
            artifact_name: fcg-macos.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-build-env
        with:
          os: ${{ runner.os }}
          build_type: Release

      - name: Configure CMake
        run: >
          cmake -B build 
          -G Ninja 
          -DCMAKE_BUILD_TYPE=Release 
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5 
          -DCMAKE_C_COMPILER_LAUNCHER=sccache 
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build --config Release

      - name: Package with CPack
        working-directory: build
        run: cpack -G ZIP -C Release

      - name: Rename Package
        shell: bash
        run: |
          GENERATED_ZIP=$(find build -maxdepth 1 -name "*.zip" -print -quit)
          
          if [ -n "$GENERATED_ZIP" ]; then
            echo "Moving $GENERATED_ZIP to ${{ matrix.artifact_name }}"
            mv "$GENERATED_ZIP" "${{ matrix.artifact_name }}"
          else
            echo "Error: No zip file found in build directory"
            exit 1
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact_name }}
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}