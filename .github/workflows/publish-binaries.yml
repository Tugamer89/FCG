name: Publish Binaries

on:
  release:
    types: [published]

jobs:
  publish-binaries:
    name: Package for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: fcg-linux.zip
          - os: windows-latest
            artifact_name: fcg-windows.zip
          - os: macos-latest
            artifact_name: fcg-macos.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libglfw3-dev libgl1-mesa-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev libudev-dev libfreetype6-dev libopenal-dev libflac-dev libogg-dev libvorbis-dev

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Setup Compiler Cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: release-${{ matrix.os }}
          variant: sccache

      - name: Configure CMake
        run: >
          cmake -B build 
          -G Ninja 
          -DCMAKE_BUILD_TYPE=Release 
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5 
          -DCMAKE_C_COMPILER_LAUNCHER=sccache 
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build --config Release

      - name: Package Release (Unix - Mac/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir release_package
          cp -r resources release_package/
          cp build/bin/* release_package/
          cd release_package
          zip -r ../${{ matrix.artifact_name }} ./*

      - name: Package Release (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path release_package
          Copy-Item -Path resources -Destination release_package -Recurse
          Copy-Item -Path build\bin\*.exe -Destination release_package
          Compress-Archive -Path release_package\* -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}